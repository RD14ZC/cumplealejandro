<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Invitación 15 Años 🎉</title>

  <!-- 🌿 TIPOGRAFÍAS -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Alegreya+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- 🌐 OPEN GRAPH (WhatsApp preview bonito) -->
  <meta property="og:title" content="🎉 Invitación 15 Años - Alejandro Joaquín" />
  <meta property="og:description" content="Estás invitado a una celebración especial 💚 Confirma tu asistencia aquí." />
  <meta property="og:image" content="https://rd14zc.github.io/cumplealejandro/preview.jpg" />
  <meta property="og:url" content="https://rd14zc.github.io/cumplealejandro/" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1db954">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="particles"></canvas>

<audio id="musica" loop>
  <source src="https://dark-wire.com/music/Up_Is_Down.mp3" type="audio/mpeg">
</audio>

<main class="slider">

  <!-- 🎉 PORTADA -->
  <section class="slide">
    <div class="card hero-card">

      <div class="emoji">🎉💚🎂</div>

      <h1>¡Estás invitado!</h1>

      <p class="subtitle">
        15 años de<br>
        <b>Alejandro Joaquín Díaz Capcha</b>
      </p>

      <div class="info">
        <p>📅 Domingo 24 Mayo 2026</p>
        <p>🕐 1:00 PM</p>

        <p>
          📍 Restaurante KAUSA - Jauja<br>
          <a class="map-btn" href="https://maps.app.goo.gl/zjE2uhNwmMkg4pGL8" target="_blank">
            Ver ubicación 🗺️
          </a>
        </p>
      </div>

      <button class="btn btn-primary" id="btnNext">
        Abrir invitación 🎟️
      </button>

    </div>
  </section>

  <!-- 📩 CONFIRMACIÓN -->
  <section class="slide">
    <div class="card">

      <h2>Confirmar asistencia</h2>
      <p class="subtitle">¡Te esperamos! 💚</p>

      <form id="form">

        <label>Tu nombre</label>
        <select id="nombre" required></select>

        <label>Plato favorito</label>
        <select id="plato" required>
          <option value="" disabled selected>Selecciona</option>
          <option value="Milanesa de pollo">Milanesa 🍗</option>
          <option value="Pollo a la plancha">Pollo 🍗</option>
        </select>

        <button class="btn btn-whatsapp" type="submit">
          Confirmar por WhatsApp 💬
        </button>

      </form>

    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
