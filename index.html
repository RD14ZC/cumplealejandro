<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>15 Años</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<canvas id="particles"></canvas>

<audio id="musica" loop>
  <source src="https://dark-wire.com/music/Up_Is_Down.mp3" type="audio/mpeg">
</audio>

<main class="container">

  <!-- 🟢 INVITACIÓN -->
  <div class="card" id="mainCard">

    <div class="badge">15 AÑOS</div>

    <h1>Alejandro Joaquín Díaz Capcha</h1>

    <p class="subtitle">
      Estás invitado(a) a una tarde muy especial ✨
    </p>

    <div class="info">

      <div class="info-item">📅 Domingo 24 de Mayo 2026</div>
      <div class="info-item">🕐 1:00 PM</div>

      <div class="info-item">
        📍 Jr Alfonso Ugarte 725 - Jauja<br>
        🍽️ Restaurante KAUSA
      </div>

      <div class="info-item">
        <a class="map-link" href="https://maps.app.goo.gl/o17wT8WZELk92eV28" target="_blank">
          Ver ubicación 🗺️
        </a>
      </div>

    </div>

    <button class="btn btn-primary" id="btnAbrir" type="button">
      Confirmar asistencia 🎉
    </button>

  </div>

  <!-- 📩 FORMULARIO -->
  <div class="card hidden" id="formCard">

    <h2>Confirmación</h2>

    <form id="form">

      <label>Nombre</label>
      <select id="nombre" name="nombre" required>
        <option value="" disabled selected>Selecciona tu nombre</option>
      </select>

      <label>Plato favorito</label>
      <select id="plato" name="plato" required>
        <option value="" disabled selected>Selecciona un plato</option>
        <option value="Milanesa de pollo">MILANESA DE POLLO</option>
        <option value="Pollo a la plancha">POLLO A LA PLANCHA</option>
      </select>

      <button class="btn btn-whatsapp" type="submit">
        Enviar por WhatsApp 💬
      </button>

    </form>

  </div>

</main>

<script src="script.js"></script>

</body>
</html>
